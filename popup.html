<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hide WA Sidebar</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #111b21;
        color: #e9edef;
        width: 240px;
        padding: 20px;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        padding-bottom: 14px;
        border-bottom: 1px solid #2a3942;
      }

      .wa-icon {
        width: 28px;
        height: 28px;
        background: #00a884;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .wa-icon svg {
        width: 16px;
        height: 16px;
        fill: #fff;
      }

      h1 {
        font-size: 14px;
        font-weight: 600;
        color: #e9edef;
        letter-spacing: 0.2px;
      }

      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
        min-height: 20px;
      }

      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #8696a0;
        flex-shrink: 0;
        transition: background 0.2s;
      }

      .dot.blurred {
        background: #00a884;
      }

      #status {
        font-size: 12px;
        color: #8696a0;
        line-height: 1.4;
      }

      #toggle-btn {
        width: 100%;
        padding: 10px 16px;
        border: none;
        border-radius: 8px;
        background: #00a884;
        color: #fff;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
        letter-spacing: 0.2px;
      }

      #toggle-btn:hover:not(:disabled) {
        background: #06cf9c;
      }

      #toggle-btn:active:not(:disabled) {
        transform: scale(0.98);
      }

      #toggle-btn.active {
        background: #2a3942;
        color: #e9edef;
      }

      #toggle-btn.active:hover:not(:disabled) {
        background: #3b4a54;
      }

      #toggle-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      .blur-hint {
        margin-top: 12px;
        font-size: 11px;
        color: #8696a0;
        line-height: 1.5;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="wa-icon">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"
          />
        </svg>
      </div>
      <h1>Hide WA Sidebar</h1>
    </div>

    <div class="status-row">
      <div class="dot" id="dot"></div>
      <p id="status">Memuat status...</p>
    </div>

    <button id="toggle-btn" disabled>Sembunyikan Sidebar</button>

    <p class="blur-hint">Hover ke sidebar untuk melihat sebentar</p>

    <script src="dist/popup.js"></script>
  </body>
</html>
